Invite to join to a family
The roles are listed below:
[0]father, [1]mother, [2] uncle, [3]aunt [4]daii [5]amme
---

tags:
  - Invitation API

parameters:
  - name: Authorization
    in: header
    description: Access Token
    required: true
    type: string

  - in: formData
    name: familyId
    required: true
    type: integer

  - in: formData
    name: role
    type: integer

  - in: formData
    name: inviteeUsername
    type: string

  - in: formData
    name: text
    type: string


responses:
  200:
    description: Response contains the token that needed in Add-to-family API

  400:
    description: invalid input data

  700:
    description: invalid role

  701:
    description: username not exists

  702:
    description: family not exists

  744:
    description: no available role

  745:
    description: only role {roles} is valid

  747:
    description: user in family
