---
version: '3'

services:

  redis:
    image: redis:6
    restart: always
    volumes:
      - redis_volume:/data

  db:
    image: postgres:12
    restart: always
    environment:
      POSTGRES_DB      : ${POSTGRES_DB}
      POSTGRES_USER    : ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: 
      - postgres_volume:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    hostname: say-rabbit 
    volumes:
        - rabbitmq_data_volume:/var/lib/rabbitmq/
        - rabbitmq_log_volume:/var/log/rabbitmq/
    environment:
        RABBITMQ_DEFAULT_USER: $RABBITMQ_DEFAULT_USER
        RABBITMQ_DEFAULT_PASS: $RABBITMQ_DEFAULT_PASS

  pgbackups:
      image: prodrigestivill/postgres-backup-local:11-alpine
      restart: always
      volumes:
          - db_backups_volume:/backups
      depends_on:
          - db
      environment:
          - POSTGRES_HOST=db
          - POSTGRES_DB=$POSTGRES_DB
          - POSTGRES_USER=$POSTGRES_USER
          - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          - POSTGRES_EXTRA_OPTS=-Z9 --schema=public --blobs
          - SCHEDULE=@daily
          - BACKUP_KEEP_DAYS=30
          - BACKUP_KEEP_WEEKS=4
          - BACKUP_KEEP_MONTHS=6
          - HEALTHCHECK_PORT=80 

  backend: &backend
    build:
      context: .
    image: ${DOCKER_REGISTRY}/api:${CI_COMMIT_REF_SLUG:-dev}
    #- DB=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST/$POSTGRES_DB
    restart: always
    networks:
      - server
      - default
    expose:
      - 5000
    volumes:
      - ./staging-config.env:/app/config.env
      - ./apimd-config.cfg:/app/apimd-config-prod.cfg
      - backend_volume:/app/data
    logging:
      driver: journald
    depends_on:
      - "redis"
      - "db"
      - "rabbitmq"
 
  worker: &worker
    <<: *backend
    command: celery -A say.api.celery worker --loglevel=INFO --concurrency 2
    depends_on:
      - backend

  beat:
    <<: *worker
    command: celery -A say.api.celery beat -S redbeat.RedBeatScheduler --loglevel=WARNING
    depends_on:
      - worker

volumes:
  redis_volume:
  postgres_volume:
  rabbitmq_data_volume:
  rabbitmq_log_volume:
  db_backups_volume:
  backend_volume:

networks:
  server:
    external: true

